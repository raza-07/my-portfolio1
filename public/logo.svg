<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neural Crown -->
  <circle cx="50" cy="35" r="25" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <circle cx="50" cy="35" r="15" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="50" cy="35" r="5" fill="#3b82f6">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Trunk -->
  <path d="M50 35V65" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

  <!-- Roots (Circuit Style) -->
  <path d="M50 65C40 70 30 80 30 90" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 65C60 70 70 80 70 90" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 75C45 78 40 82 40 88" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 75C55 78 60 82 60 88" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Connection Nodes -->
  <circle cx="30" cy="90" r="3" fill="#3b82f6"/>
  <circle cx="70" cy="90" r="3" fill="#3b82f6"/>
  <circle cx="40" cy="88" r="2" fill="#3b82f6"/>
  <circle cx="60" cy="88" r="2" fill="#3b82f6"/>
</svg>
